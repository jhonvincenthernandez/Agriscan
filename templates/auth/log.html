{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AgriScan+{% endblock %}</title>
  <link rel="icon" type="image/jpeg" href="{% static 'polls/img/logo.jpg' %}">
  <link rel="stylesheet" href="{% static 'polls/css/tailwind.css' %}">
  <style>
    .auth-input {
      margin-top: 0.25rem;
      display: block;
      width: 100%;
      border-radius: 0.5rem;
      border: 1px solid #cbd5e1;
      background-color: #ffffff;
      padding: 0.625rem 0.75rem;
      font-size: 0.875rem;
      line-height: 1.25rem;
      color: #0f172a;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .auth-input::placeholder {
      color: #94a3b8;
    }

    .auth-input:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), 0 1px 2px rgba(15, 23, 42, 0.08);
    }

    .auth-button {
      width: 100%;
      border-radius: 0.5rem;
      background-color: #2563eb;
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      color: #ffffff;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      transition: background-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .auth-button:hover {
      background-color: #1d4ed8;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.12);
      transform: translateY(-1px);
    }

    .auth-alert {
      border: 1px solid transparent;
      border-radius: 0.5rem;
      padding: 0.75rem;
      font-size: 0.875rem;
      line-height: 1.25rem;
    }

    .auth-alert--error {
      background-color: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .auth-alert--info {
      background-color: #eff6ff;
      border-color: #bfdbfe;
      color: #1e40af;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full flex flex-col min-h-screen text-gray-800">
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12 py-4 flex items-center justify-between">
      <a href="{% url 'polls:dashboard' %}" class="flex items-center gap-2 font-bold text-blue-700">
        <img src="{% static 'polls/img/logo.jpg' %}" alt="AgriScan+ logo" class="h-8 w-8 rounded-full object-cover">
        <span>AgriScan+</span>
      </a>
    </div>
  </header>

  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-12 border-t border-gray-200 bg-white">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12 py-6 text-sm text-gray-500 flex flex-col sm:flex-row items-center justify-between gap-2">
      <p>&copy; <span id="year"></span> AgriScan+. All rights reserved.</p>
      <p class="italic">Smart Farming using AI</p>
    </div>
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  {% block extra_js %}{% endblock %}
</body>
</html>
