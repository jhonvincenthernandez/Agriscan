<!-- Reusable Restore + Purge action buttons for trash page -->
<div class="flex items-center gap-2 ml-4 flex-shrink-0">
  <!-- Restore -->
  <form method="post" action="{% url 'polls:trash_management' %}">
    {% csrf_token %}
    <input type="hidden" name="action" value="restore">
    <input type="hidden" name="model" value="{{ model }}">
    <input type="hidden" name="pk" value="{{ pk }}">
    <button type="submit"
      class="inline-flex items-center px-3 py-1.5 border border-green-300 rounded-lg text-xs font-medium text-green-700 bg-white hover:bg-green-50 transition">
      <svg class="h-3.5 w-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Restore
    </button>
  </form>

  {% if is_admin %}
  <!-- Permanent delete — admin only (uses global confirm modal) -->
  <button type="button"
    data-open-delete="true"
    data-delete-type="permanent"
    data-delete-label="{{ obj_name|default:'Record #'|add:pk }}"
    data-delete-subtitle="This record will be permanently removed and cannot be recovered."
    data-purge-url="{% url 'polls:trash_management' %}"
    data-purge-model="{{ model }}"
    data-purge-pk="{{ pk }}"
    class="inline-flex items-center px-3 py-1.5 border border-red-300 rounded-lg text-xs font-medium text-red-700 bg-white hover:bg-red-50 transition">
    <svg class="h-3.5 w-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
    </svg>
    Delete
  </button>
  {% endif %}
</div>
