<!--
  ============================================================
  AgriScan+ — Yield Prediction AI Loader Partial
  ============================================================
  Usage: { include 'partials/_ai_yield_loader.html' }
  Wire up via: YieldLoader.start() / YieldLoader.stop()
  ============================================================
-->
{% load static %}
<div
  id="ai-yield-loader"
  role="dialog"
  aria-modal="true"
  aria-labelledby="loader-title-yield"
  aria-describedby="loader-status-yield"
  style="display:none; position:fixed; inset:0; z-index:9999; align-items:center; justify-content:center;"
>
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>

  <!-- Modal Card -->
  <div class="relative z-10 w-full max-w-sm mx-4 bg-white rounded-2xl shadow-2xl overflow-hidden">

    <!-- Top accent bar — animated gradient -->
    <div class="h-1 w-full bg-gradient-to-r from-amber-400 via-green-500 to-blue-500 yield-accent-bar"></div>

    <div class="px-8 py-8">

      <!-- Icon ring -->
      <div class="flex justify-center mb-6">
        <div class="relative inline-flex items-center justify-center">
          <!-- Outer pulse rings -->
          <div class="absolute inset-0 rounded-full bg-green-100 yield-pulse-ring"></div>
          <div class="absolute inset-0 rounded-full yield-pulse-ring-2"></div>
          <!-- Inner icon container -->
          <div class="relative flex items-center justify-center h-20 w-20 rounded-full bg-gradient-to-br from-amber-500 to-green-600 shadow-lg">
            <img
              src="{% static 'polls/img/logo.jpg' %}"
              alt=""
              aria-hidden="true"
              width="44"
              height="44"
              class="rounded-full"
            >
            <!-- Orbiting dot — anchored to center of this 80px div -->
            <div class="yield-orbit-dot">
              <div class="yield-orbit-inner"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Title -->
      <h2 id="loader-title-yield" class="text-center text-xl font-bold text-gray-900 mb-1">
        Calculating Yield Estimate
      </h2>
      <p class="text-center text-sm text-gray-500 mb-6">
        Powered by AgriScan AI
      </p>

      <!-- Stage steps list -->
      <ol id="yield-steps" class="space-y-3 mb-6" aria-label="Prediction steps">
        <li class="yield-step flex items-center gap-3" data-step="0">
          <span class="yield-step-icon flex-shrink-0 h-7 w-7 rounded-full border-2 border-gray-200 bg-white flex items-center justify-center transition-all duration-300">
            <svg class="h-3.5 w-3.5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          </span>
          <span class="text-sm text-gray-400 font-medium yield-step-label">Uploading data</span>
        </li>
        <li class="yield-step flex items-center gap-3" data-step="1">
          <span class="yield-step-icon flex-shrink-0 h-7 w-7 rounded-full border-2 border-gray-200 bg-white flex items-center justify-center transition-all duration-300">
            <svg class="h-3.5 w-3.5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          </span>
          <span class="text-sm text-gray-400 font-medium yield-step-label">Preprocessing input</span>
        </li>
        <li class="yield-step flex items-center gap-3" data-step="2">
          <span class="yield-step-icon flex-shrink-0 h-7 w-7 rounded-full border-2 border-gray-200 bg-white flex items-center justify-center transition-all duration-300">
            <svg class="h-3.5 w-3.5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          </span>
          <span class="text-sm text-gray-400 font-medium yield-step-label">Running yield model</span>
        </li>
        <li class="yield-step flex items-center gap-3" data-step="3">
          <span class="yield-step-icon flex-shrink-0 h-7 w-7 rounded-full border-2 border-gray-200 bg-white flex items-center justify-center transition-all duration-300">
            <svg class="h-3.5 w-3.5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7 12a5 5 0 1110 0 5 5 0 01-10 0z"/></svg>
          </span>
          <span class="text-sm text-gray-400 font-medium yield-step-label">Calculating estimates</span>
        </li>
        <li class="yield-step flex items-center gap-3" data-step="4">
          <span class="yield-step-icon flex-shrink-0 h-7 w-7 rounded-full border-2 border-gray-200 bg-white flex items-center justify-center transition-all duration-300">
            <svg class="h-3.5 w-3.5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7 12a5 5 0 1110 0 5 5 0 01-10 0z"/></svg>
          </span>
          <span class="text-sm text-gray-400 font-medium yield-step-label">Generating report</span>
        </li>
      </ol>

      <!-- Live status text for screen readers + visual -->
      <p
        id="loader-status-yield"
        class="text-center text-xs text-gray-400 min-h-[1.25rem]"
        aria-live="polite"
        aria-atomic="true"
      ></p>

    </div>
  </div>
</div>

<style>
  /* ─────────────────────────────────────────────────────────
     Yield Loader Animations — adapted from scan loader
     ───────────────────────────────────────────────────────── */

  /* Accent bar gradient animation */
  @keyframes yield-bar-shift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .yield-accent-bar {
    background-size: 200% 200%;
    animation: yield-bar-shift 3s ease-in-out infinite;
  }

  /* Pulse rings */
  @keyframes yield-pulse-outward {
    0% {
      opacity: 1;
      transform: scale(1);
    }
    100% {
      opacity: 0;
      transform: scale(1.5);
    }
  }
  .yield-pulse-ring {
    animation: yield-pulse-outward 2s ease-out 0s infinite;
  }
  .yield-pulse-ring-2 {
    animation: yield-pulse-outward 2s ease-out 0.5s infinite;
  }

  /* Orbiting dot */
  @keyframes yield-orbit {
    0% { transform: rotate(0deg) translateX(28px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(28px) rotate(-360deg); }
  }
  .yield-orbit-dot {
    position: absolute;
    width: 28px;
    height: 28px;
    animation: yield-orbit 4s linear infinite;
  }
  .yield-orbit-inner {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.8);
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
  }

  /* Step spinner */
  @keyframes step-spin {
    to { transform: rotate(360deg); }
  }
</style>
