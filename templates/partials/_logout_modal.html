{% comment %}
  Global Logout Confirmation Modal
  =================================
  Included once in base.html.

  Trigger any element with:
    data-open-logout="true"
{% endcomment %}

<!-- Logout confirmation modal -->
<div
  id="logout-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="logout-modal-title"
  style="display:none; position:fixed; inset:0; z-index:9999; align-items:center; justify-content:center; padding:1rem;"
>
  <!-- Backdrop -->
  <div
    style="position:absolute; inset:0; background:rgba(0,0,0,0.5);"
    onclick="(function(){
      var m = document.getElementById('logout-modal');
      m.style.display = 'none';
      m.setAttribute('aria-hidden', 'true');
    })()"
  ></div>

  <!-- Card -->
  <div
    style="position:relative; width:100%; max-width:24rem; background:#fff; border-radius:0.75rem;
           box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); padding:1.5rem; border:1px solid #e5e7eb;"
  >
    <div class="flex items-center gap-3 mb-4">
      <div class="h-10 w-10 bg-red-100 rounded-full flex items-center justify-center">
        <svg class="h-5 w-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </div>
      <h3 id="logout-modal-title" class="text-lg font-semibold text-gray-900">Confirm Logout</h3>
    </div>
    <p class="text-sm text-gray-600 mb-6">
      Are you sure you want to log out of your account?
    </p>
    <div class="flex gap-3">
      <button
        id="logout-modal-cancel"
        type="button"
        class="flex-1 px-4 py-2.5 bg-white border border-gray-200 text-gray-700 rounded-lg hover:bg-gray-50 transition font-medium text-sm"
      >
        Cancel
      </button>
      <form method="post" action="{% url 'polls:logout' %}" class="flex-1">
        {% csrf_token %}
        <button
          id="logout-modal-confirm"
          type="submit"
          class="w-full px-4 py-2.5 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-lg hover:from-red-600 hover:to-red-700 transition-all shadow-lg hover:shadow-xl font-medium text-sm"
        >
          Logout
        </button>
      </form>
    </div>
  </div>
</div>

<script>
(function () {
  var logoutModal  = document.getElementById("logout-modal");
  var logoutCancel = document.getElementById("logout-modal-cancel");
  if (!logoutModal) return;

  // ── Open ─────────────────────────────────────────────────────────────────
  document.querySelectorAll("[data-open-logout]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      try { window._logoutPrevFocus = document.activeElement; } catch (_) {}
      logoutModal.style.display = "flex";
      logoutModal.setAttribute("aria-hidden", "false");
      setTimeout(function () {
        var confirm = document.getElementById("logout-modal-confirm");
        if (confirm) confirm.focus();
      }, 50);
    });
  });

  // ── Cancel ────────────────────────────────────────────────────────────────
  function closeLogoutModal() {
    logoutModal.style.display = "none";
    logoutModal.setAttribute("aria-hidden", "true");
    try { if (window._logoutPrevFocus) window._logoutPrevFocus.focus(); } catch (_) {}
  }

  if (logoutCancel) logoutCancel.addEventListener("click", closeLogoutModal);

  // ── Escape key ───────────────────────────────────────────────────────────
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && logoutModal.style.display === "flex") {
      closeLogoutModal();
    }
  });
})();
</script>
